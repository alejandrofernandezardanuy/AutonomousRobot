slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Grid més fi per tenir més detall espacial del mapa.
    resolution: 0.03

    # Actualitza el mapa més sovint i amb menys moviment mínim.
    map_update_interval: 0.2
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05

    # Ajustos robustos de scan matching.
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_time_interval: 0.2

    # Límit de rang del làser (ajusta'l al teu sensor si cal).
    max_laser_range: 8.0

    # Manté buffers suficients per estabilitat sense sobrecarregar massa.
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 10.0

    # Publicació de transform estable.
    transform_publish_period: 0.02
    tf_buffer_duration: 30.0

    # Loop closure conservador per reduir deformacions del mapa.
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Penalitza canvis bruscos per fer el mapa més net.
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
